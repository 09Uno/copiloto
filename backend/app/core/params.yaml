# Hiperparâmetros do motor — SPEC.md §7
#
# PONTO DE PARTIDA, não configuração final. A calibração é OUTPUT da Fase 2 (backtest),
# nunca input. Toda mudança aqui invalida o backtest anterior: suba a engine_version junto.
#
# Os perfis existem porque não há um parâmetro único que sirva para uma vela de 15 minutos
# do BTC e para um pregão da VALE3 — são processos estatísticos diferentes. Cada perfil é
# calibrado INDEPENDENTEMENTE na Fase 2.
#
# Hoje os perfis quase não divergem do default de propósito: ajustá-los "no olho" para fazer
# aparecer mais sinal seria fitting disfarçado. Quem decide os valores é o grid search.

engine_version: "0.2.0-rule"

default:
  regressao:
    janela: 100
    base: log_preco

  bandas:
    janela_media: 20
    n_sigma_entrada: 2.0

  regime:
    r2_max_lateral: 0.30 # acima disso = TENDENCIA → não opera reversão
    nervoso_atr_mult: 2.5 # ATR% acima de N× sua mediana móvel = choque de volatilidade
    nervoso_atr_janela: 100

  score: # pesos do score 0-100 (somam 100). Explicável de propósito — nada de ML aqui.
    peso_desvio: 40
    peso_volume: 25
    peso_rr: 20
    peso_regime: 15

  volume:
    janela_zscore: 50
    z_minimo: 2.0
    base: log_volume

  risco:
    atr_janela: 14
    stop_atr_mult: 1.5
    rr_minimo: 2.0 # descarta o sinal se TP_dist < 2 × SL_dist
    horizonte_max: # barreira temporal do triple-barrier, em velas
      15m: 24 # ~6h
      1d: 10 # 10 pregões

  custos: # por perna da operação
    cripto_taker_pct: 0.10
    acoes_br_pct: 0.05
    acoes_us_pct: 0.00
    slippage_pct: 0.05 # ← chute. A Fase 4 mede o slippage REAL e substitui (SPEC §8.4).

  # Estratégia cross-sectional (SPEC §11): rankeia o universo em vez de esperar cada papel
  # cruzar um limiar sozinho.
  cross_sectional:
    janela_reversao: 5 # retorno acumulado dos últimos N pregões
    n_extremos: 10 # opera os N mais castigados (compra) e os N mais esticados (venda)
    min_universo: 30 # abaixo disso o ranking não tem significado

  # MOMENTUM 12-1 (SPEC §13). Hipótese DECLARADA ANTES de rodar — não é pesca.
  momentum:
    janela_formacao: 252 # ~12 meses de pregão
    gap: 21 # PULA o mês mais recente. Sem isso, a reversão de curto prazo
      # (que já testamos e não tem borda) contamina o ranking e as duas
      # anomalias se cancelam — o teste não mediria nada.
    n_extremos: 15 # compra os N vencedores, vende os N perdedores
    holding: 63 # ~3 meses. A saída é por TEMPO: momentum não tem alvo de preço.
    stop_atr_mult: 5.0 # LARGO de propósito. Stop apertado mata momentum: a tese precisa
      # de meses, e 1,5×ATR expulsa a posição no primeiro tropeço (foi o
      # que estrangulou o cross-sectional: 1.096 stops contra 248 alvos).
    min_universo: 30
    long_only: true # Investidor pessoa física NÃO shorteia 15 papéis da B3 todo mês.
      # Testar a perna vendida é testar uma operação que nunca seria
      # executada — e é justamente ela que produz os crashes do momentum.

perfis:
  CRYPTO:15m: {}

  # Regressão de 100 pregões ≈ 5 meses. Numa ação, é uma janela longa — mas quem decide
  # é o backtest, não o meu palpite.
  B3:1d: {}
  US:1d: {}
  CRYPTO:1d: {}
