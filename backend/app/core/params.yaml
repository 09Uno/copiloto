# Hiperparâmetros do motor — SPEC.md §7
#
# Estes valores são um PONTO DE PARTIDA, não uma configuração final.
# A calibração é OUTPUT da Fase 2 (backtest), nunca input.
# Toda mudança aqui invalida o backtest anterior: suba a engine_version junto.

engine_version: "0.1.0-rule"

regressao:
  janela: 100 # velas
  base: log_preco

bandas:
  janela_media: 20
  n_sigma_entrada: 2.0

regime:
  r2_max_lateral: 0.30 # acima disso = TENDENCIA → não opera reversão
  nervoso_atr_mult: 2.5 # ATR% acima de N× sua mediana móvel = choque de volatilidade
  nervoso_atr_janela: 100

score: # pesos do score 0-100 (somam 100). Explicável de propósito — nada de ML aqui.
  peso_desvio: 40 # quão além de n_sigma o preço foi
  peso_volume: 25 # quão além de z_minimo o volume confirmou
  peso_rr: 20 # quão acima de rr_minimo ficou o risco:retorno
  peso_regime: 15 # quão claramente lateral está o mercado (R² baixo)

volume:
  janela_zscore: 50
  z_minimo: 2.0
  base: log_volume

risco:
  atr_janela: 14
  stop_atr_mult: 1.5
  rr_minimo: 2.0 # descarta o sinal se TP_dist < 2 × SL_dist
  horizonte_max: # barreira temporal do triple-barrier, em velas
    15m: 24 # ~6h
    1d: 10 # 10 pregões

custos: # percentuais, por perna da operação
  cripto_taker_pct: 0.10
  acoes_br_pct: 0.05
  acoes_us_pct: 0.00
  slippage_pct: 0.05
